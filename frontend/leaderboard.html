<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Arena - Leaderboard</title>
        <link href="css/dashboard.css" rel="stylesheet">
        <link href="css/leaderboard.css" rel="stylesheet">
        <script>
            const savedTheme = localStorage.getItem('arena-theme');
            if(savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else if(!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('arena-theme', 'light');
            }
        </script>
    </head>
    <body>
        <main class="container">
            <header class="header">
                <div class="header-top">
                    <div class="wordmark">ARENA</div>
                    <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
                <div class="subtitle">Global Rankings</div>
            </header>

            <section class="card" aria-labelledby="leaderboardHeading">
                <div class="leaderboardHeader">
                    <h2 id="leaderboardHeading" class="welcome">Top Players</h2>
                    <a href="dashboard.html" class="btn btn-redirect-lobby">← Back to Lobby</a>
                </div>

                <div class="table-container">
                    <table class="leaderboard-table" aria-label="Player Rankings">
                        <thead>
                            <tr>
                                <th scope="col">Rank</th>
                                <th scope="col">Player Name</th>
                                <th scope="col">Elo Rating</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody" aria-live="polite">
                            <tr>
                                <td colspan="3">Loading rankings...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <script src="js/theme.js"></script>
        <script src="js/leaderboard.js"></script>
    </body>
</html>
